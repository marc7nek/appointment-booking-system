<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Appointment Booking</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/appointments">QA Appointment Booking</a>
      <nav>
        <a href="/appointments">Appointments</a>
        <a href="/appointments/new">New appointment</a>
        <button id="logout-button" class="ghost-button" type="button">Log out</button>
      </nav>
    </header>

    <main>
      <section id="login-view" class="view narrow" hidden>
        <h1>Sign in</h1>
        <form id="login-form" class="panel">
          <label>
            Email
            <input data-testid="email-input" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input
              data-testid="password-input"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>
          <button data-testid="login-submit" type="submit">Sign in</button>
          <p data-testid="login-error" class="error" hidden>Invalid email or password.</p>
        </form>
      </section>

      <section id="appointments-view" class="view" hidden>
        <div class="page-heading">
          <h1>Your appointments</h1>
          <a class="button-link" href="/appointments/new">Book appointment</a>
        </div>
        <div id="appointments-list" class="appointments-list"></div>
      </section>

      <section id="booking-view" class="view narrow" hidden>
        <h1>New appointment</h1>
        <form id="booking-form" class="panel">
          <label>
            Service
            <select data-testid="service-select" name="serviceId"></select>
          </label>
          <label>
            Provider
            <select data-testid="provider-select" name="providerId"></select>
          </label>
          <label>
            Date
            <input data-testid="date-input" name="date" type="date" required />
          </label>
          <div>
            <span class="field-label">Time</span>
            <div class="time-slots">
              <button data-testid="time-slot" type="button" class="time-slot" data-time="09:00">
                09:00
              </button>
              <button data-testid="time-slot" type="button" class="time-slot" data-time="10:00">
                10:00
              </button>
              <button data-testid="time-slot" type="button" class="time-slot" data-time="11:30">
                11:30
              </button>
            </div>
          </div>
          <label>
            Note
            <textarea data-testid="patient-note" name="patientNote" rows="3"></textarea>
          </label>
          <button data-testid="booking-submit" type="submit">Book</button>
          <p data-testid="booking-confirmation" class="success" hidden></p>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
