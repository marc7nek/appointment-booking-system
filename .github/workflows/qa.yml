name: QA Automation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - ui
          - api
          - sql
          - all

jobs:
  quality-gate:
    name: Typecheck and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  playwright:
    name: Playwright ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        suite: [smoke, api]
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_URL: ${{ secrets.API_URL }}
      QA_PATIENT_EMAIL: ${{ secrets.QA_PATIENT_EMAIL }}
      QA_PATIENT_PASSWORD: ${{ secrets.QA_PATIENT_PASSWORD }}
      QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
      QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
      QA_SERVICE_ID: ${{ secrets.QA_SERVICE_ID }}
      QA_PROVIDER_ID: ${{ secrets.QA_PROVIDER_ID }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSL: ${{ secrets.DB_SSL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run selected suite
        run: npm run test:${{ matrix.suite }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.suite }}
          path: test-results/junit.xml
          retention-days: 14

  manual-suite:
    name: Manual suite dispatch
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      API_URL: ${{ secrets.API_URL }}
      QA_PATIENT_EMAIL: ${{ secrets.QA_PATIENT_EMAIL }}
      QA_PATIENT_PASSWORD: ${{ secrets.QA_PATIENT_PASSWORD }}
      QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
      QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
      QA_SERVICE_ID: ${{ secrets.QA_SERVICE_ID }}
      QA_PROVIDER_ID: ${{ secrets.QA_PROVIDER_ID }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSL: ${{ secrets.DB_SSL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run workflow dispatch suite
        run: |
          if [ "${{ inputs.test_suite }}" = "all" ]; then
            npm test
          else
            npm run test:${{ inputs.test_suite }}
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-manual-${{ inputs.test_suite }}
          path: playwright-report
          retention-days: 14
